<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ Watts & Ultimate Studio — Kimana, Kenya</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body class="landing">

  <!-- Grain overlay -->
  <div class="grain"></div>

  <div class="split-container">

    <!-- LEFT: DJ WATTS -->
    <div class="split left" id="split-sound">
      <div class="split-bg sound-bg"></div>
      <div class="split-content">
        <span class="eyebrow">THE SOUND</span>
        <h1 class="split-title">DJ<br>WATTS</h1>
        <p class="split-sub">Events. Sets. Vibes.<br>Kimana & Beyond.</p>
        <div class="split-actions">
          <a href="services.html#dj" class="btn btn-outline">Book a Set</a>
          <a href="services.html" class="btn-text">See Services →</a>
        </div>
      </div>
      <div class="split-label">SOUND</div>
    </div>

    <!-- DIVIDER -->
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-logo">W<span>&</span>S</div>
      <div class="divider-line"></div>
    </div>

    <!-- RIGHT: ULTIMATE STUDIO -->
    <div class="split right" id="split-sight">
      <div class="split-bg sight-bg"></div>
      <div class="split-content">
        <span class="eyebrow">THE SIGHT</span>
        <h1 class="split-title">ULTIMATE<br>STUDIO</h1>
        <p class="split-sub">Photography. Memory.<br>Artistry.</p>
        <div class="split-actions">
          <a href="services.html#photo" class="btn btn-outline">Book a Session</a>
          <a href="gallery.html" class="btn-text">View Gallery →</a>
        </div>
      </div>
      <div class="split-label">SIGHT</div>
    </div>

  </div>

  <!-- Navigation strip -->
  <nav class="bottom-nav">
    <a href="index.html">Home</a>
    <a href="services.html">Services</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
